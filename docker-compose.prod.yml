# docker-compose.prod.yml — Production (VPS / DigitalOcean)
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: always
    # ── Memory tuning ─────────────────────────────────────────────────────────
    # $8  plan (1 GB): shared_buffers=32MB  max_connections=20
    # $16 plan (2 GB): shared_buffers=64MB  max_connections=50
    command: >
      postgres
      -c shared_buffers=${PG_SHARED_BUFFERS:-32MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE:-96MB}
      -c work_mem=${PG_WORK_MEM:-2MB}
      -c maintenance_work_mem=${PG_MAINT_MEM:-16MB}
      -c max_connections=${PG_MAX_CONN:-20}
      -c wal_buffers=4MB
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: ${DB_MEM_LIMIT:-128m}
    memswap_limit: ${DB_MEMSWAP_LIMIT:-256m}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ${IMAGE_NAME:-homexo}:${IMAGE_TAG:-latest}
    build:
      context: .
      target: runtime
    restart: always
    mem_limit: ${WEB_MEM_LIMIT:-256m}
    memswap_limit: ${WEB_MEMSWAP_LIMIT:-512m}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: "5432"
      DEBUG: "False"
      # ── Gunicorn tuning (override in .env) ──────────────────────────────────
      # $8  plan (1 GB): WORKERS=1 THREADS=2 MAX_REQUESTS=500
      # $16 plan (2 GB): WORKERS=2 THREADS=4 MAX_REQUESTS=1000
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      GUNICORN_MAX_REQUESTS: ${GUNICORN_MAX_REQUESTS:-500}
      GUNICORN_LOG_LEVEL: ${GUNICORN_LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    mem_limit: 64m
    memswap_limit: 128m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Run manually: docker compose -f docker-compose.prod.yml run --rm certbot certonly ...
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  media_data:
  static_data:
  certbot_data:
  certbot_www:
