# docker-compose.prod.yml — Production (VPS / DigitalOcean)
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ${IMAGE_NAME:-homexo}:${IMAGE_TAG:-latest}
    build:
      context: .
      target: runtime
    restart: always
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: "5432"
      DEBUG: "False"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Run manually: docker compose -f docker-compose.prod.yml run --rm certbot certonly ...
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  media_data:
  static_data:
  certbot_data:
  certbot_www:
