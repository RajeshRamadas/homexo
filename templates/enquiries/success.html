{% extends 'base.html' %}
{% block title %}Thank You — HOMEXO{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;background:var(--ivory);text-align:center;padding:60px 20px;">
  <div style="max-width:500px;">
    <div style="font-size:64px;margin-bottom:24px;">✅</div>
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:clamp(36px,4vw,52px);font-weight:300;color:var(--charcoal);margin-bottom:16px;">Enquiry <em>Received</em></h1>
    <p style="font-size:15px;color:var(--warm-grey);line-height:1.8;margin-bottom:36px;">Thank you for reaching out. Our team will contact you within 24 hours to assist with your property needs.</p>
    <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">
      <a href="{% url 'pages:home' %}" class="btn-primary">Back to Home</a>
      <a href="{% url 'properties:list' %}" class="btn-outline">Browse Properties</a>
    </div>
  </div>
</div>
{% endblock %}
