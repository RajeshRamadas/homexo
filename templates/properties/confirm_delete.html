{% extends 'base.html' %}
{% block title %}Remove Listing — HOMEXO{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;background:var(--ivory);padding:60px 20px;">
  <div style="max-width:480px;text-align:center;">
    <div style="font-size:56px;margin-bottom:20px;">🗑️</div>
    <h1 style="font-family:'Source Sans 3',sans-serif;font-size:40px;font-weight:300;color:var(--charcoal);margin-bottom:12px;">Remove Listing</h1>
    <p style="color:var(--warm-grey);font-size:14px;line-height:1.8;margin-bottom:8px;">You are about to permanently remove:</p>
    <p style="font-size:16px;font-weight:500;color:var(--navy);margin-bottom:32px;">{{ property.title }}</p>
    <div style="display:flex;gap:14px;justify-content:center;">
      <a href="{{ property.get_absolute_url }}" class="btn-outline">Cancel</a>
      <form method="POST">
        {% csrf_token %}
        <button type="submit" style="background:#c62828;color:white;padding:16px 36px;border:none;cursor:pointer;font-size:12px;letter-spacing:2px;text-transform:uppercase;font-family:'Source Sans 3',sans-serif;">Confirm Remove</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
