{% extends 'base.html' %}
{% block title %}Reset Password — HOMEXO{% endblock %}

{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;background:var(--ivory);padding:60px 20px;">
  <div style="width:100%;max-width:440px;">
    <div style="text-align:center;margin-bottom:36px;">
      <div class="section-eyebrow" style="justify-content:center;">Account Recovery</div>
      <h1 class="section-title">Reset <em>Password</em></h1>
      <p style="font-size:14px;color:var(--warm-grey);margin-top:12px;line-height:1.6;">
        Enter the email address linked to your account and we'll send you a reset link.
      </p>
    </div>
    <div style="background:var(--white);padding:40px;border:1px solid var(--border);">
      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" required autofocus
                 style="width:100%;padding:12px 16px;border:1px solid var(--border);font-size:14px;background:var(--ivory);outline:none;box-sizing:border-box;"
                 placeholder="your@email.com">
        </div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;text-align:center;">
          Send Reset Link
        </button>
      </form>
      <div style="text-align:center;margin-top:24px;font-size:13px;color:var(--warm-grey);">
        Remembered it? <a href="{% url 'accounts:login' %}" style="color:var(--sky);text-decoration:none;">Back to Sign In</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
