{% extends 'base.html' %}
{% block title %}Password Reset Complete — HOMEXO{% endblock %}
{% block robots %}noindex, nofollow{% endblock %}

{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;background:var(--ivory);padding:60px 20px;">
  <div style="width:100%;max-width:480px;text-align:center;">
    <div style="background:var(--white);padding:48px 40px;border:1px solid var(--border);">
      <div style="width:64px;height:64px;background:#22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="section-eyebrow" style="justify-content:center;margin-bottom:12px;">All Done</div>
      <h2 class="section-title" style="font-size:28px;">Password Updated</h2>
      <p style="font-size:14px;color:var(--warm-grey);margin-top:16px;line-height:1.7;">
        Your password has been successfully reset.<br>
        You can now sign in with your new password.
      </p>
      <div style="margin-top:32px;">
        <a href="{% url 'accounts:login' %}" class="btn-primary" style="display:inline-block;">Sign In</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
